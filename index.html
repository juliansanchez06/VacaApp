<!DOCTYPE html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#163d44" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SoyPekun" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SoyPekun" />
    <meta name="description" content="Simulador económico ganadero para el campo argentino" />

    <!-- Open Graph -->
    <meta property="og:title" content="SoyPekun — Simulador Ganadero" />
    <meta property="og:description" content="Gestión económica ganadera para el campo argentino" />
    <meta property="og:type" content="website" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

    <!-- Splash screens iOS (opcional) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <title>SoyPekun</title>

    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/App.jsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => {
              console.log('[PWA] Service Worker registrado:', reg.scope);

              // Detectar actualizaciones disponibles
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Nueva versión disponible — mostrar notificación
                    if (confirm('Hay una nueva versión de SoyPekun disponible. ¿Actualizar?')) {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch(err => console.warn('[PWA] Service Worker falló:', err));
        });

        // Escuchar mensajes del SW (ej: sync solicitado)
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'SYNC_REQUESTED') {
            // Disparar el evento online para que la app haga el flush
            window.dispatchEvent(new Event('online'));
          }
        });
      }
    </script>
  </body>
</html>
